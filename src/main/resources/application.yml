spring:
  application:
    name: Devit
  datasource:
    url: ${DB_URL:jdbc:h2:mem:testdb}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    database-platform: ${DB_PLATFORM:org.hibernate.dialect.H2Dialect}

  jwt:
    secret: ${JWT_SECRET:dev-secret-key-for-development-only-change-in-production}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:86400000}

  mail:
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # OAuth2 설정 (클라이언트 ID가 설정되어 있을 때만 활성화)
  # security:
  #   oauth2:
