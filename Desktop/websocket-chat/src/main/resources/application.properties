# ==================================
# Spring Boot Configuration
# ==================================

# Server Port
server.port=8080

# ==================================
# Database Configuration (MySQL)
# ==================================

# JDBC URL - replace YOUR_DB_NAME with your actual database name
spring.datasource.url=jdbc:mysql://localhost:3306/websocket_chat_db?serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=hen061813*
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================================
# JPA/Hibernate Configuration
# ==================================

# MySQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# DDL Auto: update allows Hibernate to update the schema (tables) based on entities
# Use 'none' or 'validate' in production environment
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (useful for debugging)
spring.jpa.show-sql=true

# Format SQL output
spring.jpa.properties.hibernate.format_sql=true

# ==================================
# Redis Configuration
# ==================================
# Redis를 사용하지 않을 경우 주석 처리
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# ==================================
# Mail Configuration
# ==================================
# Mail을 사용하지 않을 경우 주석 처리
# spring.mail.host=smtp.gmail.com
# spring.mail.username=${MAIL_USERNAME}
# spring.mail.password=${MAIL_PASSWORD}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# ==================================
# OAuth2 Configuration
# ==================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope[0]=profile
spring.security.oauth2.client.registration.google.scope[1]=email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=id

# ==================================
# JWT Configuration
# ==================================
