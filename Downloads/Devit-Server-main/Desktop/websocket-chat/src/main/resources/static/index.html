<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈 - WebSocket Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white rounded-2xl shadow-2xl p-12 max-w-md w-full">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600 mb-4">
                    WebSocket Chat
                </h1>
                <p class="text-gray-600">실시간 채팅 & 프로젝트 관리 시스템</p>
            </div>

            <div id="authButtons" class="space-y-4">
                <!-- 로그인 전 버튼들 -->
                <div id="guestButtons">
                    <a href="/signup.html" class="block w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-4 px-6 rounded-lg text-center font-semibold hover:shadow-lg transition duration-300">
                        📝 회원가입
                    </a>
                    <a href="/login.html" class="block w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-4 px-6 rounded-lg text-center font-semibold hover:shadow-lg transition duration-300">
                        🔐 로그인
                    </a>
                    <a href="/oauth2/authorization/google" class="block w-full bg-gradient-to-r from-red-500 to-red-600 text-white py-4 px-6 rounded-lg text-center font-semibold hover:shadow-lg transition duration-300 flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
                            <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google로 로그인
                    </a>
                </div>
                
                <!-- 로그인 후 버튼들 -->
                <div id="userButtons" class="hidden">
                    <div class="bg-gray-50 rounded-lg p-4 mb-4">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <div id="userAvatar" class="w-10 h-10 bg-gradient-to-r from-purple-600 to-pink-600 rounded-full flex items-center justify-center text-white font-semibold mr-3"></div>
                                <div>
                                    <p id="userName" class="font-semibold text-gray-800"></p>
                                    <p id="userEmail" class="text-sm text-gray-600"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button onclick="logout()" class="block w-full bg-gradient-to-r from-red-600 to-red-700 text-white py-4 px-6 rounded-lg text-center font-semibold hover:shadow-lg transition duration-300">
                        🚪 로그아웃
                    </button>
                </div>
            </div>
            
            <div class="space-y-4 mt-4">
                <a href="/chat.html" class="block w-full bg-gradient-to-r from-green-600 to-teal-600 text-white py-4 px-6 rounded-lg text-center font-semibold hover:shadow-lg transition duration-300">
                    💬 채팅방
                </a>
                <a href="/project.html" class="block w-full bg-gradient-to-r from-orange-600 to-red-600 text-white py-4 px-6 rounded-lg text-center font-semibold hover:shadow-lg transition duration-300">
                    📚 프로젝트 관리
                </a>
            </div>

            <div class="mt-8 p-4 bg-gray-50 rounded-lg text-center">
                <p class="text-sm text-gray-600">현재 서버 상태:</p>
                <div id="serverStatus" class="mt-2 flex items-center justify-center">
                    <div class="w-3 h-3 bg-yellow-400 rounded-full animate-pulse mr-2"></div>
                    <span class="text-sm font-semibold">확인 중...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 로그인 상태 확인
        async function checkAuthStatus() {
            try {
                const response = await fetch('/api/users/me', {
                    credentials: 'include' // 쿠키 포함
                });
                
                // 초기 상태: 모든 버튼 숨김
                document.getElementById('guestButtons').classList.add('hidden');
                document.getElementById('userButtons').classList.add('hidden');
                
                if (response.ok) {
                    const userInfo = await response.json();
                    console.log('사용자 정보:', userInfo);
                    
                    // JSON에서 isAuthenticated는 authenticated로 직렬화됨
                    const isAuthenticated = userInfo.isAuthenticated === true || userInfo.authenticated === true;
                    
                    if (userInfo && isAuthenticated) {
                        // 로그인 상태
                        document.getElementById('guestButtons').classList.add('hidden');
                        document.getElementById('userButtons').classList.remove('hidden');
                        
                        // 사용자 정보 표시
                        const userNameEl = document.getElementById('userName');
                        const userEmailEl = document.getElementById('userEmail');
                        const userAvatarEl = document.getElementById('userAvatar');
                        
                        if (userNameEl) {
                            userNameEl.textContent = userInfo.name || '사용자';
                        }
                        if (userEmailEl) {
                            userEmailEl.textContent = userInfo.email || '';
                        }
                        
                        // 아바타 초기 표시 (이름 첫 글자)
                        if (userAvatarEl) {
                            if (userInfo.picture) {
                                // 프로필 이미지가 있으면 사용
                                userAvatarEl.innerHTML = `<img src="${userInfo.picture}" alt="${userInfo.name || '사용자'}" class="w-full h-full rounded-full object-cover">`;
                            } else if (userInfo.name) {
                                // 이름 첫 글자
                                userAvatarEl.textContent = userInfo.name.charAt(0).toUpperCase();
                            } else {
                                userAvatarEl.textContent = '?';
                            }
                        }
                    } else {
                        // 비로그인 상태
                        document.getElementById('guestButtons').classList.remove('hidden');
                        document.getElementById('userButtons').classList.add('hidden');
                    }
                } else {
                    // 인증 실패 (401, 403 등)
                    console.log('인증 실패 - 상태 코드:', response.status);
                    document.getElementById('guestButtons').classList.remove('hidden');
                    document.getElementById('userButtons').classList.add('hidden');
                }
            } catch (error) {
                console.error('인증 상태 확인 오류:', error);
                document.getElementById('guestButtons').classList.remove('hidden');
                document.getElementById('userButtons').classList.add('hidden');
            }
        }
        
        // 로그아웃 함수
        function logout() {
            // 쿠키 삭제
            document.cookie = 'accessToken=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
            // 로컬 스토리지 삭제
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            
            // 로그아웃 API 호출
            fetch('/logout', {
                method: 'POST',
                credentials: 'include'
            })
            .then(() => {
                // 페이지 새로고침
                window.location.reload();
            })
            .catch(() => {
                // 에러가 나도 페이지 새로고침
                window.location.reload();
            });
        }
        
        // 서버 상태 확인
        fetch('/auth/test')
            .then(response => {
                if (response.ok) {
                    document.getElementById('serverStatus').innerHTML = `
                        <div class="w-3 h-3 bg-green-400 rounded-full mr-2"></div>
                        <span class="text-sm font-semibold text-green-600">서버 정상 작동 중</span>
                    `;
                } else {
                    throw new Error('서버 응답 오류: ' + response.status);
                }
            })
            .catch(error => {
                console.error('서버 상태 확인 오류:', error);
                document.getElementById('serverStatus').innerHTML = `
                    <div class="w-3 h-3 bg-red-400 rounded-full mr-2"></div>
                    <span class="text-sm font-semibold text-red-600">서버 연결 실패</span>
                `;
            });
        
        // 페이지 로드 시 인증 상태 확인
        checkAuthStatus();
    </script>
</body>
</html>
