<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈 - WebSocket Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white rounded-2xl shadow-2xl p-12 max-w-md w-full">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600 mb-4">
                    WebSocket Chat
                </h1>
                <p class="text-gray-600">실시간 채팅 & 프로젝트 관리 시스템</p>
            </div>

            <div class="space-y-4">
                <a href="/signup.html" class="block w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-4 px-6 rounded-lg text-center font-semibold hover:shadow-lg transition duration-300">
                    📝 회원가입
                </a>
                <a href="/login.html" class="block w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-4 px-6 rounded-lg text-center font-semibold hover:shadow-lg transition duration-300">
                    🔐 로그인
                </a>
                <a href="/chat.html" class="block w-full bg-gradient-to-r from-green-600 to-teal-600 text-white py-4 px-6 rounded-lg text-center font-semibold hover:shadow-lg transition duration-300">
                    💬 채팅방
                </a>
                <a href="/project.html" class="block w-full bg-gradient-to-r from-orange-600 to-red-600 text-white py-4 px-6 rounded-lg text-center font-semibold hover:shadow-lg transition duration-300">
                    📚 프로젝트 관리
                </a>
            </div>

            <div class="mt-8 p-4 bg-gray-50 rounded-lg text-center">
                <p class="text-sm text-gray-600">현재 서버 상태:</p>
                <div id="serverStatus" class="mt-2 flex items-center justify-center">
                    <div class="w-3 h-3 bg-yellow-400 rounded-full animate-pulse mr-2"></div>
                    <span class="text-sm font-semibold">확인 중...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 서버 상태 확인
        fetch('/auth/test')
            .then(response => {
                if (response.ok) {
                    document.getElementById('serverStatus').innerHTML = `
                        <div class="w-3 h-3 bg-green-400 rounded-full mr-2"></div>
                        <span class="text-sm font-semibold text-green-600">서버 정상 작동 중</span>
                    `;
                } else {
                    throw new Error('서버 응답 오류: ' + response.status);
                }
            })
            .catch(error => {
                console.error('서버 상태 확인 오류:', error);
                document.getElementById('serverStatus').innerHTML = `
                    <div class="w-3 h-3 bg-red-400 rounded-full mr-2"></div>
                    <span class="text-sm font-semibold text-red-600">서버 연결 실패</span>
                `;
            });
    </script>
</body>
</html>
